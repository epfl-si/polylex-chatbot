- name: RAG env file
  template:
    src: .env
    dest: /srv/rag/.env
    owner: root
    group: root
    mode: "0644"

- name: RAG source directory
  copy:
    src: ../../../rag/lib/
    dest: /srv/rag/lib/
    owner: root
    group: root
    mode: "0644"

# TODO : executer les scripts uniquement si besoin avec tag a part
- name: Script to build corpus
  command: /srv/rag/venv/bin/python3 -m rag.lib.build_corpus
  args:
    chdir: /srv

# TODO : executer les scripts uniquement si besoin avec tag a part
- name: Script to index corpus
  command: /srv/rag/venv/bin/python3 -m rag.lib.index_corpus
  args:
    chdir: /srv

- name: Chatbot source directory
  synchronize:
    src: ../../../app/
    dest: /srv/rag/chatbot/
    delete: true
    rsync_opts:
      - "--exclude=.env"

- name: Chatbot env file
  template:
    src: chatbot.env.j2
    dest: /srv/rag/chatbot/.env
    owner: root
    group: root
    mode: "0600"

- name: /etc/systemd/system/polylex-chatbot.service
  copy:
    content: |
      [Unit]
      Description=Polylex Chatbot
      After=multi-user.target
      
      [Service]
      Type=simple
      Restart=always
      Environment="PATH=/srv/rag/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      Environment="VIRTUAL_ENV=/srv/rag/venv"
      WorkingDirectory=/srv/rag/chatbot
      EnvironmentFile=/srv/rag/chatbot/.env
      ExecStart=/srv/rag/venv/bin/chainlit run app.py --host 0.0.0.0 --port 80
      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/polylex-chatbot.service

- name: Polylex Chatbot service
  systemd_service:
    name: polylex-chatbot.service
    state: started
    enabled: true
