- name: RAG directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /srv/rag
    - /srv/rag/lib
    - /srv/rag/data
    - /srv/rag/stats
    - /srv/rag/chatbot
  become: true

- name: Apt prerequisites
  apt:
    name:
      - software-properties-common
      - python3-apt
      - gpg
      - openjdk-21-jre-headless
      - tesseract-ocr
    state: present
    update_cache: true

- name: ppa deadsnakes/ppa
  command:
    cmd: add-apt-repository -y ppa:deadsnakes/ppa
    creates: "/etc/apt/sources.list.d/deadsnakes-ubuntu-ppa-resolute.sources"

- name: Apt cache cleaning
  apt:
    autoclean: true
    autoremove: true
  become: true

- name: Pip cache removed
  file:
    path: /root/.cache/pip
    state: absent
  become: true

- name: Apt packages for python
  apt:
    name:
      - python3.13
      - python3-virtualenv

- name: Virtual env for rag
  command:
    cmd: virtualenv /srv/rag/venv -p python3.13
    creates: "/srv/rag/venv"

- name: Python requirements file
  copy:
    src: ../../../requirements.txt
    dest: /srv/rag/requirements.txt
    owner: root
    group: root
    mode: "0644"

- name: Python requirements
  pip:
    requirements: /srv/rag/requirements.txt
    virtualenv: /srv/rag/venv
    extra_args: --no-cache-dir

